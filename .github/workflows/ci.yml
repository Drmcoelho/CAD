name: ci
on: [push, pull_request]
jobs:
  consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: suíte canônica completa (npm run ci)
        run: npm run ci

  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: instala dependências do render
        run: npm install --no-audit --no-fund
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - name: instala Chromium do Playwright
        run: npx playwright install --with-deps chromium
      - name: render-smoke com navegador real
        run: npm run smoke:render
