<text x="192" y="1306" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Tripwire SaMD</text>
<text x="145" y="1375" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="740" fill="#edf5fb" opacity="1">Uso pessoal: humano-no-loop.</text>
<text x="145" y="1412.12" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="740" fill="#edf5fb" opacity="1">Compartilhar, ceder a outro</text>
<text x="145" y="1449.2399999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="740" fill="#edf5fb" opacity="1">clinico ou embarcar em fluxo</text>
<text x="145" y="1486.3599999999997" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="740" fill="#edf5fb" opacity="1">institucional reabre gate</text>
<text x="145" y="1523.4799999999996" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="740" fill="#edf5fb" opacity="1">regulatorio.</text>
