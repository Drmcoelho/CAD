<text x="192" y="2036" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Fecho</text>
<text x="150" y="2110" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">CAD 360 não ensina protocolo decorado. Ensina a nomear o estado</text>
<text x="150" y="2150.96" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">metabólico atual e escolher a próxima intervenção que não atrapalha a</text>
<text x="150" y="2191.92" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">fisiologia.</text>
