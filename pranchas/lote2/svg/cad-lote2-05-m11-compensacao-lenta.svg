<text x="960" y="705" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="700" fill="#aebdcc" opacity="1">some devagar</text>
<text x="150" y="900" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="730" fill="#edf5fb" opacity="1">A planilha calcula instantaneamente; o corpo depende de perfusão renal,</text>
