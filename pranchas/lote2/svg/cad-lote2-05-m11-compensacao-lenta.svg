<text x="192" y="1951" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Métrica certa</text>
<text x="150" y="2020" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">Julgue tendência: queda de cetona/gap, K protegido, osm sem queda</text>
<text x="150" y="2060.96" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">brusca, cloro reconhecido. Um ponto isolado é pouco; a curva é a</text>
<text x="150" y="2101.92" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">resposta.</text>
