<text x="796" y="1211" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Urina cetônica engana</text>
<text x="755" y="1300" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="900" fill="#ffffff" opacity="1">β-OHB → AcAc</text>
<text x="755" y="1405" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="730" fill="#edf5fb" opacity="1">Na melhora, β-OHB vira</text>
<text x="755" y="1440.84" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="730" fill="#edf5fb" opacity="1">acetoacetato. A fita pode</text>
<text x="755" y="1476.6799999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="730" fill="#edf5fb" opacity="1">parecer pior enquanto a cetose</text>
<text x="755" y="1512.5199999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="730" fill="#edf5fb" opacity="1">real melhora.</text>
