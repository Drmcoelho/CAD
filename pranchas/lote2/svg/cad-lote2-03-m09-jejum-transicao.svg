<text x="88" y="126" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="900" fill="#37c6e0" letter-spacing="5">CAD 360 · M09</text>
<text x="88" y="204" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff">Jejum e transicao</text>
<text x="90" y="258" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#aebdcc">Jejum nao significa ausencia de glicose IV.</text>
<line x1="88" y1="306" x2="1232" y2="306" stroke="#314557" stroke-width="2"/>
<rect x="88" y="370" width="1144" height="560" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="396" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#55d88f" stroke-width="2" opacity="1"/>
<text x="145" y="436" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#55d88f" opacity="1">1</text>
<text x="192" y="436" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Jejum não significa sem glicose</text>
<text x="150" y="525" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="40" font-weight="900" fill="#55d88f" opacity="1">glicose caiu</text>
<text x="150" y="600" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="40" font-weight="900" fill="#ff6464" opacity="1">gap/cetona seguem</text>
<text x="150" y="715" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="31" font-weight="750" fill="#edf5fb" opacity="1">A resposta não é desligar insulina. É ligar dextrose para</text>
<text x="150" y="754.68" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="31" font-weight="750" fill="#edf5fb" opacity="1">permitir que a insulina continue fechando a cetogênese.</text>
<rect x="88" y="1030" width="540" height="650" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="1056" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#f2b441" stroke-width="2" opacity="1"/>
<text x="145" y="1096" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#f2b441" opacity="1">2</text>
<text x="192" y="1096" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Quando manter jejum</text>
<rect x="145" y="1160" width="330" height="52" rx="26.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="310.0" y="1193.92" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="850" fill="#edf5fb" opacity="1">vomitos</text>
<rect x="145" y="1238" width="330" height="52" rx="26.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="310.0" y="1271.92" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="850" fill="#edf5fb" opacity="1">risco de aspiracao</text>
<rect x="145" y="1316" width="330" height="52" rx="26.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="310.0" y="1349.92" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="850" fill="#edf5fb" opacity="1">rebaixamento</text>
<rect x="145" y="1394" width="330" height="52" rx="26.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="310.0" y="1427.92" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="850" fill="#edf5fb" opacity="1">procedimento</text>
<rect x="145" y="1472" width="330" height="52" rx="26.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="310.0" y="1505.92" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="850" fill="#edf5fb" opacity="1">instabilidade</text>
<rect x="692" y="1030" width="540" height="650" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="720" y="1056" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#37c6e0" stroke-width="2" opacity="1"/>
<text x="749" y="1096" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#37c6e0" opacity="1">3</text>
<text x="796" y="1096" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Transição segura</text>
<rect x="755" y="1160" width="360" height="58" rx="29.0" fill="#55d88f" stroke="#314557" stroke-width="1.5"/>
<text x="935.0" y="1197.28" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="850" fill="#101820" opacity="1">tolerando VO</text>
<rect x="755" y="1250" width="360" height="58" rx="29.0" fill="#b18cf0" stroke="#314557" stroke-width="1.5"/>
<text x="935.0" y="1287.28" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="850" fill="#101820" opacity="1">cetose resolvida</text>
<rect x="755" y="1340" width="360" height="58" rx="29.0" fill="#37c6e0" stroke="#314557" stroke-width="1.5"/>
<text x="935.0" y="1377.28" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="850" fill="#101820" opacity="1">basal-bolus prescrito</text>
<rect x="755" y="1430" width="360" height="58" rx="29.0" fill="#f2b441" stroke="#314557" stroke-width="1.5"/>
<text x="935.0" y="1467.28" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="850" fill="#101820" opacity="1">sobrepor SC + IV</text>
<rect x="88" y="1765" width="1144" height="520" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="1791" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#b18cf0" stroke-width="2" opacity="1"/>
<text x="145" y="1831" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#b18cf0" opacity="1">4</text>
<text x="192" y="1831" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Regra de saída</text>
<text x="150" y="1905" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">Resolução não é 'glicose bonita'. É β-OHB &lt; 0,6 e pH &gt;=</text>
<text x="150" y="1945.96" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">7,3 ou HCO3 &gt;= 18, com plano de insulina subcutânea e</text>
<text x="150" y="1986.92" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="760" fill="#edf5fb" opacity="1">paciente clinicamente seguro.</text>
<rect x="230" y="2195" width="860" height="74" rx="37.0" fill="#55d88f" stroke="#314557" stroke-width="1.5"/>
<text x="660.0" y="2242.08" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#101820" opacity="1">Dextrose na CAD é ferramenta para continuar insulina.</text>
</svg>
