<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 2868" role="img" aria-labelledby="title desc">
<title id="title">Jejum e transicao</title>
<desc id="desc">Jejum nao significa ausencia de glicose IV.</desc>
