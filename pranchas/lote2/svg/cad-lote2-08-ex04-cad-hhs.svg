<text x="192" y="1026" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Cálculo</text>
<text x="145" y="1100" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="33" font-weight="900" fill="#ffffff" opacity="1">NaC = 130 + 2,4x5</text>
<text x="145" y="1190" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" font-weight="950" fill="#55d88f" opacity="1">= 142</text>
<text x="145" y="1310" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="27" font-weight="900" fill="#ffffff" opacity="1">Osm efetiva = 2x130 + 600/18</text>
<text x="145" y="1395" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" font-weight="950" fill="#f2b441" opacity="1">= 293,3</text>
<rect x="692" y="960" width="540" height="620" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="720" y="986" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#b18cf0" stroke-width="2" opacity="1"/>
<text x="749" y="1026" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#b18cf0" opacity="1">3</text>
<text x="796" y="1026" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Interpretação</text>
<text x="755" y="1100" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">β-OHB 3,8 e acidose leve fecham</text>
<text x="755" y="1134.56" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">eixo CAD. Osm efetiva 293 usa Na</text>
<text x="755" y="1169.12" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">MEDIDO e ainda não cruza HHS</text>
<text x="755" y="1203.6799999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">(&gt;320); o Na corrigido 142</text>
<text x="755" y="1238.2399999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">revela o déficit de água livre</text>
<text x="755" y="1272.7999999999997" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">que emerge ao corrigir a</text>
<text x="755" y="1307.3599999999997" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="760" fill="#edf5fb" opacity="1">glicose.</text>
<rect x="88" y="1690" width="1144" height="520" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="1716" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#55d88f" stroke-width="2" opacity="1"/>
<text x="145" y="1756" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#55d88f" opacity="1">4</text>
<text x="192" y="1756" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Resposta</text>
<text x="150" y="1830" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">Fenotipo misto em formacao: cetose acidotica (beta-OHB 3,8; pH 7,28) +</text>
<text x="150" y="1870.96" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">eixo hiperosmolar emergente. Osm efetiva 293,3 (Na medido) ainda NAO</text>
<text x="150" y="1911.92" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">cruza o limiar HHS (&gt;320); porem o Na corrigido 142 revela deficit de</text>
<text x="150" y="1952.88" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">agua livre/hipernatremia que aparece ao corrigir a glicose. Osm e</text>
<text x="150" y="1993.8400000000001" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="32" font-weight="780" fill="#edf5fb" opacity="1">velocidade entram no comando sem abandonar a cetose.</text>
<rect x="235" y="2130" width="850" height="74" rx="37.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="660.0" y="2177.08" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Não trate como CAD simples se a osmolaridade entrou na sala.</text>
