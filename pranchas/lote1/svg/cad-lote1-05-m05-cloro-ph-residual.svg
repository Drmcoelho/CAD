<text x="192" y="1276" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">O erro de conduta</text>
<text x="145" y="1340" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">Ler pH baixo residual como 'cetose</text>
<text x="145" y="1378.4" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">não tratada' e subir insulina</text>
<text x="145" y="1416.8000000000002" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">fabrica hipoglicemia e</text>
<text x="145" y="1455.2000000000003" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">hipocalemia.</text>
<rect x="145" y="1585" width="400" height="66" rx="33.0" fill="#ff6464" stroke="#314557" stroke-width="1.5"/>
<text x="345.0" y="1627.0" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="25" font-weight="850" fill="#101820" opacity="1">cloro não obedece insulina</text>
<text x="145" y="1715" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="26" font-weight="500" fill="#aebdcc" opacity="1">Se AG/cetona converge e Δ/Δ &lt; 1,</text>
<text x="145" y="1748.28" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="26" font-weight="500" fill="#aebdcc" opacity="1">o alvo muda: pare de perseguir</text>
<text x="145" y="1781.56" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="26" font-weight="500" fill="#aebdcc" opacity="1">pH com insulina.</text>
