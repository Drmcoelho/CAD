<text x="145" y="2026" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#b18cf0" opacity="1">4</text>
<text x="192" y="2026" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Interpretação operacional</text>
<text x="145" y="2090" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="31" font-weight="700" fill="#edf5fb" opacity="1">Δ/Δ &lt; 1 não diz 'CAD pura'. Diz o oposto: há componente</text>
<text x="145" y="2129.68" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="31" font-weight="700" fill="#edf5fb" opacity="1">normal-gap/hiperclorêmico somado. Na CAD em resolução, isso costuma ser a</text>
<text x="145" y="2169.3599999999997" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="31" font-weight="700" fill="#edf5fb" opacity="1">ressuscitação aparecendo no laboratório.</text>
<rect x="235" y="2300" width="850" height="72" rx="36.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="660.0" y="2345.72" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="850" fill="#ffffff" opacity="1">Gap manda na cetose; cloro explica o pH que ficou para trás.</text>
