<text x="192" y="1086" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Urina cetônica: atraso redox</text>
<text x="145" y="1160" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="900" fill="#ffffff" opacity="1">β-OHB  ⇄  AcAc</text>
<text x="145" y="1245" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">No pico da CAD predomina β-OHB. A</text>
<text x="145" y="1279.56" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">fita detecta AcAc, nao β-OHB. Na</text>
<text x="145" y="1314.12" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">melhora, β-OHB vira AcAc e a urina</text>
<text x="145" y="1348.6799999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">pode parecer pior.</text>
<rect x="145" y="1510" width="385" height="60" rx="30.0" fill="#b18cf0" stroke="#314557" stroke-width="1.5"/>
<text x="337.5" y="1548.64" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="850" fill="#101820" opacity="1">não titule por fita isolada</text>
<rect x="692" y="1020" width="540" height="630" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="720" y="1046" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#ef8f4c" stroke-width="2" opacity="1"/>
<text x="749" y="1086" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#ef8f4c" opacity="1">3</text>
<text x="796" y="1086" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Osmolaridade: rótulo obrigatório</text>
<rect x="740" y="1138" width="438" height="190" rx="22" fill="#0d141b" stroke="#55d88f" stroke-width="2" opacity="1"/>
