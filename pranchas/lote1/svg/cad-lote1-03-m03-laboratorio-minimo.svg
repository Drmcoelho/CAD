<text x="768" y="1236" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="29" font-weight="850" fill="#ffffff" opacity="1">2Na + glicose/18</text>
<text x="768" y="1278" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="20" font-weight="520" fill="#aebdcc" opacity="1">osm efetiva =</text>
<text x="768" y="1303.6" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="20" font-weight="520" fill="#aebdcc" opacity="1">tonicidade; ureia fica</text>
<text x="768" y="1329.1999999999998" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="20" font-weight="520" fill="#aebdcc" opacity="1">fora.</text>
<rect x="740" y="1360" width="438" height="190" rx="22" fill="#0d141b" stroke="#f2b441" stroke-width="2" opacity="1"/>
<text x="768" y="1406" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#f2b441" opacity="1">somente osm-gap</text>
<text x="768" y="1458" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="29" font-weight="850" fill="#ffffff" opacity="1">2Na + glic/18 + BUN/2,8</text>
<text x="768" y="1500" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="20" font-weight="520" fill="#aebdcc" opacity="1">ou ureia/6; comparar com</text>
<text x="768" y="1525.6" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="20" font-weight="520" fill="#aebdcc" opacity="1">osm medida.</text>
