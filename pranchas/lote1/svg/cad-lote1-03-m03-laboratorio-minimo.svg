<text x="192" y="436" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">O que cada dado sabe dizer</text>
<text x="140" y="505" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Dextro</text>
<text x="350" y="505" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="720" fill="#55d88f" opacity="1">glicose agora</text>
<text x="710" y="505" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="520" fill="#aebdcc" opacity="1">não mede cetose nem resolução</text>
<line x1="130" y1="539" x2="1188" y2="539" stroke="#314557" stroke-width="1.4"/>
<text x="140" y="589" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Gasometria</text>
<text x="350" y="589" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="720" fill="#55d88f" opacity="1">pH, pCO2, HCO3, lactato</text>
<text x="710" y="589" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="520" fill="#aebdcc" opacity="1">não mede estoque corporal de K</text>
<line x1="130" y1="623" x2="1188" y2="623" stroke="#314557" stroke-width="1.4"/>
<text x="140" y="673" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Ionograma</text>
<text x="350" y="673" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="720" fill="#55d88f" opacity="1">Na/K/Cl e coerência</text>
<text x="710" y="673" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="520" fill="#aebdcc" opacity="1">não prova causa da acidose</text>
<line x1="130" y1="707" x2="1188" y2="707" stroke="#314557" stroke-width="1.4"/>
<text x="140" y="757" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">β-OHB</text>
<text x="350" y="757" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="720" fill="#55d88f" opacity="1">cetona causal</text>
<text x="710" y="757" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="520" fill="#aebdcc" opacity="1">melhor marcador de resolução</text>
<line x1="130" y1="791" x2="1188" y2="791" stroke="#314557" stroke-width="1.4"/>
<text x="140" y="841" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Urina</text>
<text x="350" y="841" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="24" font-weight="720" fill="#55d88f" opacity="1">AcAc/acetona</text>
<text x="710" y="841" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="23" font-weight="520" fill="#aebdcc" opacity="1">pode piorar enquanto melhora</text>
<line x1="130" y1="875" x2="1188" y2="875" stroke="#314557" stroke-width="1.4"/>
<rect x="88" y="1020" width="540" height="630" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
