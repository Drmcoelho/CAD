<text x="365" y="1401" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="900" fill="#ffffff" opacity="1">AGMA de gap alto mais limpa</text>
<text x="365" y="1440" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="520" fill="#aebdcc" opacity="1">Padrao esperado da cetoacidose sem componente</text>
<text x="365" y="1468.16" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="520" fill="#aebdcc" opacity="1">metabolico importante somado.</text>
