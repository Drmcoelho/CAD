<text x="365" y="1579" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="900" fill="#ffffff" opacity="1">alcalose metabolica associada ou HCO3 previo alto</text>
<text x="365" y="1618" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="520" fill="#aebdcc" opacity="1">O gap subiu mais do que o bicarbonato caiu; procure</text>
<text x="365" y="1646.16" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="22" font-weight="520" fill="#aebdcc" opacity="1">vomitos, diuretico, contracao, bicarbonato previo.</text>
<rect x="175" y="1705" width="950" height="62" rx="31.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
