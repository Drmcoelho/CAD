<text x="365" y="492" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">Na - (Cl + HCO3)</text>
<text x="845" y="492" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">ânions não medidos;</text>
<text x="845" y="516.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">normal operacional 8-12</text>
<text x="140" y="568" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="900" fill="#37c6e0" opacity="1">AGc</text>
<text x="365" y="568" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">AG + 2,5 x (4 - albumina)</text>
<text x="845" y="568" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">hipoalbuminemia esconde</text>
<text x="845" y="592.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">gap</text>
<text x="140" y="644" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="900" fill="#37c6e0" opacity="1">Δ/Δ</text>
<text x="365" y="644" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">(AGc - 12) / (24 - HCO3)</text>
<text x="845" y="644" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">detecta mistura</text>
<text x="845" y="668.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">hiperclorêmica ou</text>
<text x="845" y="692.6400000000001" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">alcalose somada</text>
<text x="140" y="720" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="900" fill="#37c6e0" opacity="1">Winter</text>
<text x="365" y="720" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">1,5 x HCO3 + 8 +/- 2</text>
<text x="845" y="720" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">testa compensação</text>
<text x="845" y="744.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">respiratória</text>
<text x="140" y="796" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="900" fill="#37c6e0" opacity="1">Na corr</text>
<text x="365" y="796" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">Na + fator x ((gli-100)/100)</text>
<text x="845" y="796" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">fator 1,6; usar 2,4 se</text>
<text x="845" y="820.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">glicose &gt;400</text>
<text x="140" y="872" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" font-weight="900" fill="#37c6e0" opacity="1">Osm efetiva</text>
<text x="365" y="872" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="850" fill="#ffffff" opacity="1">2 x Na + glicose/18</text>
<text x="845" y="872" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">default para tonicidade</text>
<text x="845" y="896.32" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="19" font-weight="500" fill="#aebdcc" opacity="1">em CAD/HHS</text>
