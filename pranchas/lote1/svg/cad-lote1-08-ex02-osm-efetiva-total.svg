<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 2868" role="img" aria-labelledby="title desc">
<title id="title">Exercício: osmolaridade</title>
<desc id="desc">Efetiva por padrão; total/calculada só para osm-gap.</desc>
<defs>
<marker id="arrow-37c6e0" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#37c6e0"/></marker><marker id="arrow-46d7b4" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#46d7b4"/></marker><marker id="arrow-55d88f" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#55d88f"/></marker><marker id="arrow-f2b441" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#f2b441"/></marker><marker id="arrow-ef8f4c" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#ef8f4c"/></marker><marker id="arrow-ff6464" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#ff6464"/></marker><marker id="arrow-b18cf0" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#b18cf0"/></marker>
<pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
  <path d="M42 0H0V42" fill="none" stroke="#314557" stroke-width="1" opacity=".34"/>
</pattern>
<linearGradient id="warm" x1="0" x2="1">
  <stop offset="0" stop-color="#ef8f4c"/>
  <stop offset="1" stop-color="#ff6464"/>
</linearGradient>
<linearGradient id="cool" x1="0" x2="1">
  <stop offset="0" stop-color="#37c6e0"/>
  <stop offset="1" stop-color="#46d7b4"/>
</linearGradient>
</defs>
<rect width="1320" height="2868" fill="#101820"/>
<circle cx="1160" cy="40" r="310" fill="#37c6e0" opacity=".08"/>
<circle cx="120" cy="2770" r="380" fill="#ef8f4c" opacity=".06"/>
<rect x="48" y="46" width="1224" height="2776" rx="42" fill="none" stroke="#314557" stroke-width="2"/>
<text x="88" y="126" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="900" fill="#37c6e0" letter-spacing="5">CAD 360 · EX02</text>
<text x="88" y="204" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="58" font-weight="900" fill="#ffffff">Exercício: osmolaridade</text>
<text x="90" y="258" font-family="Avenir Next, Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#aebdcc">Efetiva por padrão; total/calculada só para osm-gap.</text>
<line x1="88" y1="306" x2="1232" y2="306" stroke="#314557" stroke-width="2"/>
<rect x="88" y="370" width="1144" height="460" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="396" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#37c6e0" stroke-width="2" opacity="1"/>
<text x="145" y="436" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#37c6e0" opacity="1">1</text>
<text x="192" y="436" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Dados</text>
<rect x="210" y="515" width="220" height="150" rx="20" fill="#0d141b" stroke="#314557" stroke-width="2" opacity="1"/>
<text x="320" y="570" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" font-weight="850" fill="#aebdcc" opacity="1">Na</text>
<text x="320" y="638" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="950" fill="#ffffff" opacity="1">136</text>
<rect x="510" y="515" width="220" height="150" rx="20" fill="#0d141b" stroke="#314557" stroke-width="2" opacity="1"/>
<text x="620" y="570" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" font-weight="850" fill="#aebdcc" opacity="1">glicose</text>
<text x="620" y="638" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="950" fill="#ffffff" opacity="1">360</text>
<rect x="810" y="515" width="220" height="150" rx="20" fill="#0d141b" stroke="#314557" stroke-width="2" opacity="1"/>
<text x="920" y="570" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="23" font-weight="850" fill="#aebdcc" opacity="1">BUN</text>
<text x="920" y="638" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="950" fill="#ffffff" opacity="1">42</text>
<text x="150" y="745" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="700" fill="#edf5fb" opacity="1">Pergunta: qual número guia tonicidade na CAD/HHS? E qual número só</text>
<text x="150" y="780.84" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="700" fill="#edf5fb" opacity="1">entra se a pergunta for osm-gap?</text>
<rect x="88" y="930" width="540" height="680" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="956" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#55d88f" stroke-width="2" opacity="1"/>
<text x="145" y="996" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#55d88f" opacity="1">2</text>
<text x="192" y="996" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Default: osm efetiva</text>
<text x="145" y="1080" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="36" font-weight="900" fill="#ffffff" opacity="1">2Na + glicose/18</text>
<text x="145" y="1190" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="33" font-weight="850" fill="#ffffff" opacity="1">= 2x136 + 360/18</text>
<text x="145" y="1300" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="46" font-weight="950" fill="#55d88f" opacity="1">= 292 mOsm/kg</text>
<text x="145" y="1415" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">Este e o numero de tonicidade:</text>
<text x="145" y="1449.56" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">ureia atravessa membrana e nao</text>
<text x="145" y="1484.12" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">sustenta gradiente efetivo.</text>
<rect x="692" y="930" width="540" height="680" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="720" y="956" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#f2b441" stroke-width="2" opacity="1"/>
<text x="749" y="996" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#f2b441" opacity="1">3</text>
<text x="796" y="996" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Só para osm-gap</text>
<text x="748" y="1080" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="31" font-weight="900" fill="#ffffff" opacity="1">2Na + gli/18 + BUN/2,8</text>
<text x="748" y="1190" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="33" font-weight="850" fill="#ffffff" opacity="1">= 292 + 42/2,8</text>
<text x="748" y="1300" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="46" font-weight="950" fill="#f2b441" opacity="1">= 307 mOsm/kg</text>
<text x="748" y="1415" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">Use apenas para comparar com osm</text>
<text x="748" y="1449.56" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">medida e calcular gap osmolar.</text>
<text x="748" y="1484.12" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="500" fill="#aebdcc" opacity="1">Não rotule como tonicidade.</text>
<rect x="88" y="1705" width="1144" height="565" rx="26" fill="#172330" stroke="#314557" stroke-width="2" opacity="1"/>
<rect x="116" y="1731" width="58" height="58" rx="16" fill="#1d2b3a" stroke="#ff6464" stroke-width="2" opacity="1"/>
<text x="145" y="1771" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="900" fill="#ff6464" opacity="1">4</text>
<text x="192" y="1771" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="28" font-weight="850" fill="#ffffff" opacity="1">Padronização do projeto</text>
<rect x="150" y="1845" width="420" height="66" rx="33.0" fill="#55d88f" stroke="#314557" stroke-width="1.5"/>
<text x="360.0" y="1887.0" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="25" font-weight="850" fill="#101820" opacity="1">CAD/HHS: osm efetiva</text>
<text x="610" y="1890" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="31" font-weight="900" fill="#ffffff" opacity="1">2Na + glicose/18</text>
<rect x="150" y="1975" width="420" height="66" rx="33.0" fill="#f2b441" stroke="#314557" stroke-width="1.5"/>
<text x="360.0" y="2017.0" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="25" font-weight="850" fill="#101820" opacity="1">osm-gap: osm total</text>
<text x="610" y="2020" text-anchor="start" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="31" font-weight="900" fill="#ffffff" opacity="1">+ BUN/2,8 ou ureia/6</text>
<text x="150" y="2145" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">Misturar as duas sem rótulo troca uma pergunta de tonicidade por uma</text>
<text x="150" y="2183.4" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="30" font-weight="700" fill="#edf5fb" opacity="1">pergunta de osm-gap. Em ensino, isso vira erro de decisão.</text>
<rect x="235" y="2340" width="850" height="72" rx="36.0" fill="#1d2b3a" stroke="#314557" stroke-width="1.5"/>
<text x="660.0" y="2385.72" text-anchor="middle" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="27" font-weight="850" fill="#ffffff" opacity="1">Default visual de todas as pranchas: Osm efetiva, não osm total.</text>
</svg>
