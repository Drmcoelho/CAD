<text x="150" y="648" text-anchor="start" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="29" font-weight="650" fill="#edf5fb" opacity="1">A doenca nao nasce da glicose alta: nasce da ausencia de freio hormonal</text>
